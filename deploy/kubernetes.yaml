apiVersion: v1
kind: ConfigMap
metadata:
  name: hlx-logs-config
data:
  config.yaml: |
    ar:
      # Can be overridden with AR_BASE_URL env var, for example http://ars-arserver:8008
      base_url: "http://ars-arserver:8008"
      form_name: "HLX:Logs"
      attachment_field: "1EX"
      verify_tls: false
      request_timeout_seconds: 60
      poll_interval_seconds: 2
      poll_timeout_seconds: 60
      result_query_template: "'TransactionId' = \"{transaction_id}\""
    
    pods:
      - id: "arserver.sandbox"
        label: "AR Server sandbox"
        enabled: true
        tags: ["arserver", "sandbox"]
    
    log_types:
      - id: "arerror"
        label: "AR error"
        filename: "arerror.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "core"
        category: "Core AR"
        severity: "critical"
        description: "Primary AR System error and warning log. Start here for ARERR/ARWARN messages."
      - id: "ardebug"
        label: "AR debug"
        filename: "ardebug.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "debug"
        description: "Debug trace used when server-side logging is enabled, often useful for startup and workflow investigation."
      - id: "arexception"
        label: "AR exception"
        filename: "arexception.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "core"
        category: "Core AR"
        severity: "critical"
        description: "Exception and stack trace focused log."
      - id: "armonitor"
        label: "AR monitor"
        filename: "armonitor.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "core"
        category: "Core AR"
        severity: "warning"
        description: "Startup, shutdown and monitored process activity."
      - id: "arhgroup"
        label: "AR server group"
        filename: "arhgroup.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "core"
        category: "Server Group"
        severity: "info"
        description: "Server group/high availability activity."
      - id: "arjavaplugin"
        label: "Java plugin"
        filename: "arjavaplugin.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "plugin"
        category: "Plugin"
        severity: "warning"
        description: "Java plugin server activity, integrations and plugin errors."
      - id: "arplugin"
        label: "C plugin"
        filename: "arplugin.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "plugin"
        category: "Plugin"
        severity: "warning"
        description: "C/plugin server activity if enabled/configured in this environment."
      - id: "arapi"
        label: "AR API"
        filename: "arapi.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "info"
        description: "API calls and RPC activity when API logging is enabled."
      - id: "arfilter"
        label: "AR filter"
        filename: "arfilter.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "info"
        description: "Filter/workflow execution trace when filter logging is enabled."
      - id: "arsql"
        label: "AR SQL"
        filename: "arsql.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "info"
        description: "SQL statements and database timing when SQL logging is enabled."
      - id: "arescl"
        label: "AR escalation"
        filename: "arescl.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "info"
        description: "Escalation activity when escalation logging is enabled."
      - id: "aruser"
        label: "AR user"
        filename: "aruser.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "performance"
        category: "Performance"
        severity: "info"
        description: "User/session activity when user logging is enabled."
    
    
    storage:
      data_dir: "/data"
      retention_days: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hlx-logs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hlx-logs
  template:
    metadata:
      labels:
        app: hlx-logs
    spec:
      containers:
        - name: hlx-logs
          image: hlx-logs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8095
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: hlx-logs-session
                  key: session-secret
            - name: CONFIG_PATH
              value: "/app/config.yaml"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: hlx-logs-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: hlx-logs-data
              mountPath: /data
      volumes:
        - name: hlx-logs-config
          configMap:
            name: hlx-logs-config
        - name: hlx-logs-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hlx-logs
spec:
  selector:
    app: hlx-logs
  ports:
    - name: http
      port: 8095
      targetPort: 8095
