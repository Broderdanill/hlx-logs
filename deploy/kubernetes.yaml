apiVersion: v1
kind: ConfigMap
metadata:
  name: hlx-logs-config
data:
  config.yaml: |
    ar:
      base_url: "http://platform-user-ext:8008"
      form_name: "HLX:Logs"
      attachment_field: "ZipFile"
      verify_tls: false
      request_timeout_seconds: 60
      poll_interval_seconds: 2
      poll_timeout_seconds: 60
      result_query_template: "'TransactionId' = \"{transaction_id}\""
    pods: []
    log_types: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hlx-logs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hlx-logs
  template:
    metadata:
      labels:
        app: hlx-logs
    spec:
      containers:
        - name: hlx-logs
          image: hlx-logs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: hlx-logs-session
                  key: session-secret
            - name: CONFIG_PATH
              value: "/app/config.yaml"
          volumeMounts:
            - name: hlx-logs-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: hlx-logs-config
          configMap:
            name: hlx-logs-config
---
apiVersion: v1
kind: Service
metadata:
  name: hlx-logs
spec:
  selector:
    app: hlx-logs
  ports:
    - name: http
      port: 8080
      targetPort: 8080
