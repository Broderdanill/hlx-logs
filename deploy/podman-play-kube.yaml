apiVersion: v1
kind: ConfigMap
metadata:
  name: hlx-logs-config
data:
  config.yaml: |
    ar:
      # Can be overridden with AR_BASE_URL env var, for example http://ars-arserver:8008
      base_url: "http://ars-arserver:8008"
      form_name: "HLX:Logs"
      attachment_field: "1EX"
      verify_tls: false
      request_timeout_seconds: 60
      poll_interval_seconds: 2
      poll_timeout_seconds: 60
      result_query_template: "'TransactionId' = \"{transaction_id}\""
    
    security:
      require_admin_group: true
      user_form: "User"
      login_field: "Login Name"
      group_list_field: "Group List"
      admin_group_id: "1"
    
    discovery:
      enabled: true
      refresh_interval_seconds: 300
      pod_form_name: "AR System Configuration Component Setting"
      pod_query: "'Setting Name' = \"Configuration-Name\""
      pod_value_field: "Setting Value"
      log_form_name: "AR System Server Group Logs"
      log_server_field: "Server Name"
      log_filename_field: "fileName"
      log_size_field: "File Size"
      default_directory: "/opt/bmc/ARSystem/db"
      include_zero_byte_logs: true
    
    # Pods and log files are now discovered from AR REST at login/page refresh.
    # These lists intentionally start empty and are replaced in memory by discovery.
    pods: []
    log_types: []
    
    storage:
      data_dir: "/data"
      retention_days: 5

---
apiVersion: v1
kind: Pod
metadata:
  name: hlx-logs
  labels:
    app: hlx-logs
spec:
  restartPolicy: Always
  containers:
    - name: hlx-logs
      image: localhost/hlx-logs:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8095
          hostPort: 8095
      env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: SESSION_SECRET
          value: "change-me-to-a-long-random-string"
        - name: CONFIG_PATH
          value: "/app/config.yaml"
        - name: DATA_DIR
          value: "/data"
        - name: RETENTION_DAYS
          value: "5"
        - name: REQUIRE_ADMIN_GROUP
          value: "true"
        - name: AR_ADMIN_GROUP_ID
          value: "1"
        # Optional override. If omitted, config.yaml base_url is used.
        # - name: AR_BASE_URL
        #   value: "http://ars-arserver:8008"
      volumeMounts:
        - name: hlx-logs-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: hlx-logs-data
          mountPath: /data
  volumes:
    - name: hlx-logs-config
      configMap:
        name: hlx-logs-config
    - name: hlx-logs-data
      emptyDir: {}
