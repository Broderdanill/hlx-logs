apiVersion: v1
kind: ConfigMap
metadata:
  name: hlx-logs-config
data:
  config.yaml: |
    ar:
      base_url: "http://platform-user-ext:8008"
      form_name: "HLX:Logs"
      attachment_field: "ZipFile"
      verify_tls: false
      request_timeout_seconds: 60
      poll_interval_seconds: 2
      poll_timeout_seconds: 60
      result_query_template: "'TransactionId' = \"{transaction_id}\""
    pods:
      - id: "arserver.sandbox"
        label: "AR Server sandbox"
        enabled: true
        tags: ["arserver", "sandbox"]
      - id: "platform-fts"
        label: "Platform FTS"
        enabled: true
        tags: ["fts"]
    log_types:
      - id: "arerror"
        label: "AR error log"
        filename: "arerror.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver", "fts"]
        enabled: true
        parser: "generic"
      - id: "arjavaplugin"
        label: "Java plugin log"
        filename: "arjavaplugin.log"
        directory: "/opt/bmc/ARSystem/db"
        available_on_tags: ["arserver"]
        enabled: true
        parser: "generic"
---
apiVersion: v1
kind: Pod
metadata:
  name: hlx-logs
  labels:
    app: hlx-logs
spec:
  restartPolicy: Always
  containers:
    - name: hlx-logs
      image: localhost/hlx-logs:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: SESSION_SECRET
          value: "change-me-to-a-long-random-string"
        - name: CONFIG_PATH
          value: "/app/config.yaml"
        # Optional override. If omitted, config.yaml base_url is used.
        # - name: AR_BASE_URL
        #   value: "http://platform-user-ext:8008"
      volumeMounts:
        - name: hlx-logs-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
  volumes:
    - name: hlx-logs-config
      configMap:
        name: hlx-logs-config
