<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HLX Logs</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/app-icon.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><img src="/static/app-icon.png" alt="" class="brand-icon"><span>HLX Logs</span><small>v{{ version }}</small></a>
    <nav>
      <a href="/" class="nav-link"><span class="nav-ico" aria-hidden="true">↧</span>Collect</a>
      <a href="/collections" class="nav-link"><span class="nav-ico" aria-hidden="true">▤</span>Collections</a>
      <a href="/config" class="nav-link"><span class="nav-ico" aria-hidden="true">◌</span>Discovery</a>
      <a href="/log-settings" class="nav-link"><span class="nav-ico" aria-hidden="true">⚙</span>Log settings</a>
      {% if username %}<span class="signed-in">{{ username }}</span>{% endif %}
      {% if username %}<form method="post" action="/logout" class="inline"><button class="nav-button">Logout</button></form>{% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <div id="globalLoading" class="global-loading" hidden>
    <div class="global-loading-card">
      <div class="mini-progress-icon"><img src="/static/app-icon.png" alt=""></div>
      <strong>Loading...</strong>
      <span>Preparing view and indexing log data</span>
      <div class="loading-bar"><div></div></div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
