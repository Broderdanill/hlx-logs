<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hlx-logs</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/app-icon.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><img src="/static/app-icon.png" alt="" class="brand-icon"><span>hlx-logs</span><small>v{{ version }}</small></a>
    <nav>
      <a href="/">Collect</a>
      <a href="/collections">Collections</a>
      <a href="/config">Config</a>
      {% if username %}<span class="signed-in">{{ username }}</span>{% endif %}
      {% if username %}<form method="post" action="/logout" class="inline"><button>Logout</button></form>{% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
