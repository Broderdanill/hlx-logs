{% extends "base.html" %}
{% block content %}
<section class="progress-card" data-job-id="{{ job.transaction_id }}">
  <div class="progress-icon-wrap"><img src="/static/progress-icon.png" alt="" class="progress-icon"></div>
  <p class="eyebrow">Fetching logs...</p>
  <h1 id="progressMessage">{{ job.message }}</h1>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
  <div class="progress-meta"><span id="progressCount">0 / {{ job.total }}</span><span>{{ job.transaction_id }}</span></div>
  <div class="activity-lines" id="activityLines"><div>Initializing collection job...</div></div>
</section>
<script>window.HLX_JOB_ID = "{{ job.transaction_id }}";</script>
{% endblock %}
